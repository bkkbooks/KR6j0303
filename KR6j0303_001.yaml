body:
  text: 唐南天竺三藏法師菩提流志奉詔譯如是我聞一時薄伽梵在布怛落迦山聖觀自在菩薩宮中其地有無量寶娑羅樹多摩羅樹瞻博迦樹阿輸迦樹阿底目多迦等種種寶樹周匝莊嚴與大苾芻衆八千人俱菩薩摩訶薩九十九俱胝那庾多百千及無量百千淨居天子自在天子大自在天子大梵天子而為上首及餘無量百千天人前後圍繞佛為説法爾時聖觀自在菩薩摩訶薩從座而起偏袒右肩右膝著地向佛合掌舒顏微笑而白佛言世尊我有神呪心名不空羂索於彼往昔第九十一劫時有世界名曰勝觀其佛號世主王如來我從彼佛受不空羂索呪心世尊我由受持是神呪故教化無量百千淨居天子自在天子大自在天子令趣阿耨多羅三藐三菩提以是功德力故便獲十億三摩地不空妙智而為上首世尊若所在之處有此呪心其地即有大自在等十二億諸天而來擁護如佛制多世尊此神呪心隨所住處其中有情當知已於無量百千俱胝那庾多百千佛所種諸善根世尊若復有人聞此呪心是人先造惡業行於非法毀辱賢善誹謗正法及以誹謗一切諸佛菩薩聲聞緣覺決定應墮無間大地獄中世尊彼人若聞此神呪心而生悔愧於一日夜受持齋戒讀此神呪即能銷滅一切罪業或復令其所有罪業現世輕受若得熱病或一日二日乃至七日若眼耳鼻舌脣齒齗齶心腹臍脅手足支節等痛若得痔病下痢祕澀白癩大癩若疥若癬若黑瘡赤瘡漏瘡疱瘡若癲癎等病若厭禱蠱毒繫縛杖捶誹謗罵辱及餘諸惡逼惱身心并諸怪夢我今説以現受故無間惡業即得銷滅況諸衆生清淨信者受持此呪一切罪業而不滅耶世尊若有衆生以其諂曲虛誑之心聞我所説不空羂索呪心詐現受持若自書若令他書若為他説令其聽受乃至向彼傍生耳邊誦此呪心及思惟神呪章句不毀謗故無相故無生故無分別故遲至故無作故離染故平等故不捨故離蘊故如是修習相應方便由此憶念佛功德力彼十方面各有千佛出現其前行者見已所有罪業皆悉銷滅世尊我今略説乃至有人抄寫此經置於家中禮拜供養亦得無量無邊福德何況受持讀誦之者世尊若有衆生各各自為欲勝他故或怖主故怖怨讐故怖惡獸故怖危難故或隨他故求尊貴故求財寶故聽聞如是神呪心經雖復聽聞不生恭敬或致誹謗輕慢毀訾由觀自在菩薩威神力故令如是人亦生勝福譬如有人取栴檀香或沈麝等罵詈毀訾而碎抹之用塗其身而彼香等終無是念此人毀訾我故吝其香氣而不與之而栴檀等本性芬馥作其香事世尊此神呪心亦復如是雖有誹謗毀訾或復諂詐書寫受持供養而皆與作善根因緣生生之處常不捨離戒定智慧福德資糧於當來世戒香具足世尊若有善男子善女人若苾芻苾芻尼塢波索迦塢波斯迦於月八日專心齋戒不雜餘語誦此不空羂索呪心七遍彼人現身得二十種殊勝利益云何二十一者身無餘病二者由先作業有諸疾病速得銷滅三者其身光澤皮膚細軟見者歡喜四者衆人愛敬密護諸根五者當得財寶六者得財寶已不為盜賊之所劫掠七者不為水火之所漂焚八者不為王力之所侵奪九者所作事業皆善成辦十者所種苗稼不為惡風暴雨霜雹蟲蝗之所損害十一者若誦此呪心七遍呪灰及水八方上下灑散結界一切災難皆得銷滅十二者不為諸惡鬼等奪其精氣十三者一切有情愛樂喜見十四者不怖怨讐十五者設有怨讐速疾和解十六者不畏人及非人之所侵害厭蠱邪魅不能中傷十七者無有猛利煩惱及隨煩惱十八者火刀毒藥傷害不死十九者諸天善神常所擁護二十者所生之處於中不離慈悲喜捨如是二十種殊勝利益應當希求復有八法何等為八一者臨命終時聖觀自在菩薩作苾芻像現其人前二者臨命終時安樂捨壽無諸痛苦三者臨命終時正念現前心不錯亂四者臨命終時手不紛亂足不伸縮五者臨命終時而不漏泄大小便利六者設使有病不滯床枕七者臨命終時不覆面死八者臨命終時得無盡辨才既命終已隨願往生諸佛淨土及不捨離諸善知識世尊若善男子善女人等不食酒肉薰辛及殘惡觸日日三時時別三遍誦此神呪心法門殊勝功德晝夜增長了知一切有情有力無力隨其聽聞菩薩不應心生祕惜永離諸惡慳吝嫉妬常為利益一切有情故速趣菩提入菩薩位言菩提者説名般若言薩埵者即是方便此二種法於諸有情當得一切利益安樂世尊我今欲為利益安樂諸四部衆及餘有情造罪業者惟願世尊哀愍許可於如來前説此呪心爾時世尊告聖觀自在菩薩摩訶薩言有情清淨今正是時我亦隨喜此神呪心於後時分為行菩薩乘者而作父母令諸菩薩所作事業速得成就爾時聖觀自在菩薩摩訶薩瞻仰尊顏目不暫捨而白佛言世尊惟願如來聽我説此神呪一切菩薩所應敬禮此解脫法門哀愍世間利益安樂無量有情欲受持者應先敬禮三世諸佛及諸菩薩獨覺聲聞敬禮正至正行復應敬禮舍利子等大慧聲聞復應敬禮慈氏等上首菩薩摩訶薩衆敬禮金色光明吼聲自在王如來敬禮師子遊戲王如來敬禮無量光如來敬禮善住摩尼寶積王如來敬禮普光明讚歎功德積王如來敬禮勝觀如來敬禮寶髻如來敬禮現世間如來敬禮捨離損壞蘊如來敬禮金色身寂如來敬禮飲光如來敬禮能寂如來敬禮善名稱如來敬禮普光勝怨敵德如來敬禮帝幢德如來敬禮寶光明自在王如來敬禮無礙藥王如來敬禮勇猛遊步如來敬禮善住無畏如來應正等覺敬禮三寶敬禮聖觀自在菩薩摩訶薩具大悲者敬禮如是諸聖者已復應念言聖觀自在菩薩於如來前説神呪心我今亦當説此神呪願我所作事業速得成辦令我一切怖畏皆除爾時聖觀自在菩薩即説呪曰䫂丁可切姪徒也切下皆同他一闍者之可切下皆同𡆆攞音轉舌呼之自此已下非口傍字其傍加口者皆倣此者𡆆二旨𭌆旨𭌆三主嚕主嚕四母嚕母嚕五麼呵呼可切迦訖可切下皆同嚕抳嬭旨切迦也藥可切下皆同音璽𭌆璽𭌆七旨𭌆旨𭌆八費房費切下皆同𭌆費𭌆九麼呵跛達陀訖切下皆同麼呵娑思訖切下皆同䫂也十迦攞迦攞十一枳吉旨切下皆同履枳履十二矩魯矩魯十三麼呵輸上聲自此下注平上去入者依平上去入聲呼柁縒麁可切怛多訖切下皆同縛房可切下皆同也十四部姪部姪十五柁縛柁縛十六迦嬭拏可切下皆同迦嬭十七枳抳枳抳十八矩努拏古切下音同矩努十九跛𡆆麼輸上音柁縒怛縛也二十迦𡆆迦𡆆二十一枳𭌆枳𭌆二十二矩嚕矩嚕二十三麼呵娑他上音麼般比訖切下皆同𡆆般䫂也二十四者攞者攞二十五散去音者攞散去音者𡆆二十六費者攞費者攞二十七般𡆆者攞般𡆆者攞二十八翳吒吒可切下皆同吒翳吒吒二十九婆上音𡆆婆上音攞三十鼻𭌆鼻𭌆三十一部嚕部嚕三十二䫂𡆆䫂𡆆三十三底丁旨切下皆同𭌆底𭌆三十四覩嚕覩嚕三十五翳欯火吉切裔呬火二切下皆同三十六麼呵迦嚕抳迦三十七麼呵跛輸跛底吠灑沙河切下皆同柁𡆆三十八柁𡆆柁𡆆三十九縒𡆆縒𡆆四十者囉者囉四十一跛囉跛𡆆四十二縛𡆆縛𡆆四十三呵𡆆呵囉四十四呵呵呬呬虎虎四十五暗迦𡆆勃𡆆喝訶訖切下皆同麼吠灑柁𡆆四十六柁𡆆柁𡆆四十七地𭌆地𭌆四十八杜嚕杜嚕四十九䫂攞䫂攞五十縒𡆆縒𡆆五十一跛𡆆跛𡆆五十二縛𡆆縛𡆆五十三曷𡆆失弭捨尸可切下皆同䫂縒呵娑𡆆五十四般𡆆底漫雉䫂捨𭌆囉五十五實時訖切下皆同縛攞實縛攞五十六䫂跛䫂跛五十七婆上音縒婆上音縒五十八勃𡆆麼勃𡆆麼五十九婆上音伽上音飯素麼地𥿃丁也切六十也麼縛嚕嬭矩吠𡆆六十一勃𡆆喝麵達𡆆六十二曷𭌆史第縛伽上音嬭罷薄也切下皆同㗚旨䫂六十三者𡆆嬭六十四蘇上音嚕蘇上音嚕六十五主嚕主嚕六十六母嚕母嚕六十七補嚕補嚕六十八縒𭢟那可切下同怛矩麼𡆆鶻嚕達𡆆縛縒縛六十九費瑟努七十柁𭢟柁七十一縛逸縛䞘其訖切儞七十二第縛七十三曷𭌆史𭢟也迦七十四婆上音虎費費柁吠灑柁𡆆七十五柁𡆆柁囉七十六地𭌆地𭌆七十七杜嚕杜嚕七十八他上音𡆆他上音𡆆七十九伽上音𡆆伽上音𡆆八十也𡆆也𡆆八十一攞囉攞囉八十二呵𡆆呵𡆆八十三跛𡆆跛𡆆八十四麼𡆆麼𡆆八十五縛𡆆縛𡆆八十六縛𡆆柁也迦八十七縒漫䫂縛路枳䫂八十八費路枳䫂八十九路計失縛𡆆九十麼醯去音失縛𡆆九十一母虎母虎九十二母嚕母嚕九十三母也母也九十四悶者悶者九十五𠸪叉𠸪叉九十六此中誦呪者應自稱我某甲薩縛縒怛防去音失者九十七薩縛婆上音裔罷九十八薩部跛𡆆跛罷九十九薩部跛薩祁祁計切罷一百薩縛䞘𡆆醯去音羅一百一縛柁伴柁𭢟一百二䫂荼上音𭢟一百三䫂㗚社時可切下皆同𭢟一百四曷𡆆杜䫂娑迦𡆆一百五𭢔烏可切䞘弩那矩切柁迦一百六費灑捨娑怛𡆆一百七跛𭌆慕者迦一百八迦嬭迦嬭一百九枳抳枳抳一百一十矩努矩努一百一十一者𡆆者𡆆一百一十二旨𭌆旨𭌆一百一十三主嚕主嚕一百一十四印達𭌆也一百一十五婆上音攞步鄧陀證切伽上音一百一十六者覩𡆆㗚野縒𥿃丁也切百十七三去音般𡆆迦捨迦一百十八䫂麼䫂麼一百一十九縒麼縒麼一百二十麼縒麼縒一百二十一麼呵䫂悶柁迦𡆆一百二十二費柁麼𭢟一百二十三灑痓吒訖切下皆同跛𡆆弭䫂一百二十四跛𭌆補𡆆迦一百二十五弭履弭履一百二十六吒吒吒吒一百二十七侘敕可切下皆同侘侘侘一百二十八徵吒旨切下皆同徵徵徵一百二十九柱吒古切下皆同柱柱柱一百三十翳耐拏計切也折之設切麼一百三十一訖哩䫂跛𭌆迦𡆆一百三十二翳欯裔呬一百三十三伊上音失縛𡆆部䫂伽上音嬭伴社迦一百三十四矩嚕矩嚕一百三十五跛𡆆跛𡆆一百三十六者𡆆者𡆆一百三十七縒𡆆縒𡆆一百三十八迦𡆆迦𡆆一百三十九迦吒迦吒一百四十跛吒跛吒一百四十一麼吒麼吒一百四十二費輪上音柁費灑也儞縛信一百四十三麼呵迦嚕抳迦一百四十四失吠䫂也寶乳跛費䫂一百四十五曷𡆆怛𭢟麼矩吒一百四十六麼攞柁𡆆一百四十七薩縛實若而可切始𡆆璽訖哩䫂一百四十八社吒麼矩吒一百四十九麼呵達部䫂迦麼攞一百五十訖哩䫂迦𡆆䫂攞一百五十一姪𭢟縒麼地費木叉一百五十二般羅劍俱暗切𧟶必也切一百五十三婆上音虎縒怛縛散去音䫂底一百五十四跛𭌆跛者迦一百五十五麼呵迦嚕抳迦一百五十六薩縛羯麼縛𡆆一百五十七費戍柁迦一百五十八薩縛筏房也切地一百五十九般𡆆慕者迦一百六十薩縛縒怛縛阿捨也一百六十一跛𭌆補𡆆迦一百六十二薩縛縛縒怛縛一百六十三縒麼失縛縒迦𡆆一百六十四𭢟慕娑覩諦娑縛呵一百六十五𭢔慕伽上音也娑縛呵一百六十六𭢔視䫂也娑縛呵一百六十七𭢔跛囉視䫂也娑縛呵一百六十八費囉也娑縛呵一百六十九縛𡆆柁也娑縛呵一百七十縛𡆆般𡆆柁也娑縛呵一百七十一伊上音誕者謎薩縛羯麼矩嚕一百七十二𭢟慕娑都娑縛呵一百七十三闍社也賧呼暗切下皆同娑縛呵一百七十四暗喝𡆆視娑縛呵一百七十五暗欯𭌆怛𡃤路加吉也切費社也一百七十六𭢔慕伽上音跛捨一百七十七𭢔般攞底呵䫂一百七十八欯𭌆一百七十九呵一百八十呬一百八十一賧一百八十二叵窒叵窒一百八十三娑縛呵一百八十四此神呪心隨誦有驗所作皆成日日三時一一時中各誦三遍五無間罪皆得銷滅一切業障皆得清淨燒沈水香或散灰散水或白芥子以為結界或取佉陀羅木為橛呪三七遍已而釘四方若患一切寒熱瘧病呪線結索帶之病得除愈諸有病者或呪酥油或復呪水令彼病者若服若塗即得除差若被厭蠱應以麵泥蠟等為人形像以刀斷截復以呪索令被厭者身常佩之若患腹痛應呪鹽水與之令服若遭諸毒呪土或水若塗若服即得銷滅若患眼宜呪白線為索用繫其耳若患牙齒疼痛呪迦羅費羅木而揩嚼之若欲結界以佉陀羅木為橛釘於四隅呪五色縷二十一遍周圍橛內若欲自護及護他者應呪索帶或呪水呪灰灑散其身若患一切鬼病呪五色線為索帶之若患一切熱病呪白色線為索帶之若患一切諸惡瘡腫若咽喉閉塞以蜜和蓽茇而呪服之若患眼病應呪香水或波羅賒水或甘草水而用洗之若患耳痛呪胡麻油滴彼耳中若諸鬪戰諍訟毀謗應取呪水用洗其面若欲擁護王都聚落應取四瓶滿中盛水及以飲食作大供養其誦呪者著新淨衣讀誦此呪即得吉祥復以彼水散灑其處擁護一切諸有情等所有災厄皆得銷滅若患邪病以水磨栴檀呪二十一遍塗其心上若犯四重五逆諸無間罪應常誦此呪其罪銷滅若護宅舍應取蓮華一百八枚各呪一遍於火中燒若欲令一切有情隨順已者應取栴檀長二寸者一百八枚各呪一遍於火中燒若著鬼魅及有怖畏應取社耶藥費社耶藥那矩梨藥健陀那矩梨藥婆刺尼藥阿婆野波抳藥因達羅波抳藥乾陀鉢履樣瞿藥多伽羅藥斫訖羅藥摩訶斫訖羅藥毗瑟怒訖爛多藥蘇摩羅時藥蘇難陀等如是諸藥搗篩水和為丸誦呪一百八遍若置頭上若繫兩臂小兒項上鬼魅怖畏皆自銷滅若有婦人由薄福故被人厭賤及求男者著新淨衣呪彼藥水滿三七遍澡浴自身得勝福德惡相銷滅求男得男一切獲益毒火不侵災橫不著若遇惡風暴雨及災雹者呪水三七遍用灑四方若呪迦羅費羅木杖滿三七遍指撝虛空風等便息聖觀自在菩薩大神呪心成就如是最勝事業未成辦者應以素㲲畫作佛像所用彩色和以香膠勿取餘膠於佛像邊畫觀自在菩薩像其身黃白紺髮垂下首冠華冠披醫泥耶皮如摩醯首羅狀環釧皆以珍寶而嚴飾之畫師將欲畫時先當受八戒齋法畫像成已於彼像前用瞿摩夷作曼荼羅縱廣一丈六尺散以白華其壇八方安八瓶香水置八分食或六十四分如是供養除薰辛等燒沈水香當三日三夜不食或一日一夜不食若食之時但食三種日食於日日中三時澡浴著新淨衣誦呪一千八遍誦呪滿已行者即於像前自見其身光明熾盛猶如猛焰如是見已心生歡喜聖觀自在菩薩便現其前所有願求皆令滿足若欲隱形應取雌黃或安繕那藥呪一千八遍即得隱形乘空而行獲不空智上首莊嚴勝三摩地所有意樂皆得成辦如是説已時薄伽梵歡喜讚歎爾時聖觀自在菩薩摩訶薩及淨居天子索訶世界主自在大自在天王及諸菩薩大聲聞等承佛所説歡喜奉行
